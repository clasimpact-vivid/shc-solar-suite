<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Planificare Șantier — SHC Solar Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',system-ui,sans-serif;background:#090f1c;color:#e2e8f0;}

/* ── Login ── */
#loginOverlay{position:fixed;inset:0;z-index:9999;background:#090f1c;display:flex;align-items:center;justify-content:center;}
.login-card{background:#111827;border:1px solid #1e3a5f;border-radius:16px;padding:36px 32px;width:380px;max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.form-label{font-size:11px;font-weight:700;color:#475569;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.form-select,.form-input{width:100%;padding:10px 13px;border:1.5px solid #334155;border-radius:10px;font-size:14px;font-family:inherit;background:#1e293b;color:#f1f5f9;outline:none;}
.form-select:focus,.form-input:focus{border-color:#3b82f6;}
.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:0;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-login:hover{opacity:.9;}

/* ── App layout ── */
#app{display:none;height:100vh;flex-direction:column;}
#topBar{background:#0d1b2e;border-bottom:1px solid #1e3a5f;padding:0 18px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;}
#layout{display:flex;flex:1;overflow:hidden;position:relative;}
.hamburger{display:none;}
.sidebar-backdrop{display:none;}
.sidebar-backdrop.show{display:block;}
@media(max-width:768px){
  #sidebar{position:fixed!important;left:0;top:0;height:100%!important;z-index:300;transform:translateX(-105%);transition:transform .25s cubic-bezier(.16,1,.3,1);width:82vw!important;max-width:300px;}
  #sidebar.open{transform:translateX(0);}
  .sidebar-backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:290;}
  .hamburger{display:flex!important;align-items:center;justify-content:center;width:34px;height:34px;border:1px solid #334155;border-radius:8px;background:transparent;cursor:pointer;flex:none;color:#94a3b8;}
  #topBar{padding:0 10px!important;gap:6px!important;}
  #ganttControls{padding:8px 8px!important;gap:6px!important;}
  #viewLabel{min-width:0!important;font-size:11px!important;}
  #userName{display:none;}
}

/* ── Sidebar ── */
#sidebar{width:256px;background:#0d1b2e;border-right:1px solid #1e3a5f;display:flex;flex-direction:column;flex-shrink:0;}
#sidebarHeader{padding:12px;border-bottom:1px solid #1e3a5f;display:flex;flex-direction:column;gap:6px;}
#projectList{max-height:260px;overflow-y:auto;padding:6px 0;}
#appFooter canvas{display:block;}
.proj-item{padding:9px 14px;cursor:pointer;border-left:3px solid transparent;display:flex;align-items:center;gap:10px;transition:background .1s;}
.proj-item:hover{background:rgba(59,130,246,.08);}
.proj-item.active{background:rgba(59,130,246,.12);border-left-color:#3b82f6;}
.proj-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.proj-name{font-size:13px;font-weight:600;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.proj-client{font-size:11px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── Main ── */
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
#ganttControls{padding:8px 14px;background:#0d1b2e;border-bottom:1px solid #1e3a5f;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
#ganttWrap{flex:1;overflow:auto;position:relative;}

/* ── Gantt table ── */
#ganttTable{border-collapse:collapse;table-layout:fixed;}
.gantt-th-label{background:#0d1b2e;position:sticky;left:0;z-index:10;padding:6px 12px;font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;width:240px;min-width:240px;border-right:1px solid #1e3a5f;border-bottom:1px solid #1e3a5f;}
.gantt-th-month{background:#0d1b2e;padding:6px 4px;font-size:11px;font-weight:700;color:#94a3b8;text-align:center;border-bottom:1px solid #1e3a5f;white-space:nowrap;border-right:1px solid rgba(30,58,95,.4);}
.gantt-td-label{background:#090f1c;position:sticky;left:0;z-index:5;padding:5px 10px;border-right:1px solid #1e3a5f;border-bottom:1px solid rgba(30,58,95,.35);width:240px;min-width:240px;max-width:240px;}
.gantt-td-cell{background:#090f1c;border-bottom:1px solid rgba(30,58,95,.35);position:relative;}
.proj-row .gantt-td-label{background:#0d1b2e;}
.proj-row .gantt-td-cell{background:#0d1b2e;}
.proj-label{font-size:12px;font-weight:700;color:#e2e8f0;display:flex;align-items:center;gap:6px;user-select:none;}
.stage-label{font-size:11px;color:#94a3b8;display:flex;align-items:center;gap:5px;padding-left:14px;}
.gantt-bar{position:absolute;top:5px;height:22px;border-radius:5px;cursor:pointer;display:flex;align-items:center;padding:0 7px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:0 2px 6px rgba(0,0,0,.35);}
.gantt-bar:hover{filter:brightness(1.15);}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;z-index:8;pointer-events:none;}
.today-label{position:absolute;top:1px;left:4px;font-size:8px;font-weight:800;color:#ef4444;white-space:nowrap;}

/* ── Buttons ── */
.btn{padding:6px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid transparent;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-blue{background:#2563eb;color:#fff;}
.btn-green{background:#16a34a;color:#fff;}
.btn-ghost{background:transparent;color:#94a3b8;border-color:#334155;}
.btn-red{background:#dc2626;color:#fff;}
.btn-sm{padding:4px 9px;font-size:11px;border-radius:6px;}
.btn-icon{padding:3px 7px;font-size:11px;border-radius:5px;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:2000;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-card{background:#111827;border:1px solid #1e3a5f;border-radius:14px;padding:26px 28px;width:480px;max-width:96vw;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:800;color:#f1f5f9;margin-bottom:18px;}
.field{margin-bottom:12px;}
.field label{font-size:10px;font-weight:700;color:#475569;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1.5px solid #334155;border-radius:8px;font-size:13px;font-family:inherit;background:#1e293b;color:#f1f5f9;outline:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#3b82f6;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;}
.badge-red{background:rgba(239,68,68,.15);color:#f87171;}
.badge-yellow{background:rgba(234,179,8,.15);color:#fbbf24;}
.badge-green{background:rgba(34,197,94,.15);color:#4ade80;}
.badge-blue{background:rgba(59,130,246,.15);color:#60a5fa;}

/* ── Empty ── */
.empty-state{padding:70px 20px;text-align:center;color:#334155;}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:3px;}

a{color:#60a5fa;}
a:hover{color:#93c5fd;}
</style>

function parseDate(s){ 
  if(!s) return null; 
  // Handle dd/mm/yyyy
  if(s.includes('/')){
    const p=s.split('/');
    if(p.length===3) s=p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');

  return isNaN(d)?null:d; 
}
function fmtDate(d){ if(!d) return ''; return d.toLocaleDateString('ro-RO',{day:'2-digit',month:'short'}); }
function toISO(d){ if(!d) return ''; return d.toISOString().slice(0,10); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function diffDays(a,b){ return Math.round((b-a)/864e5); }
function today(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function getStageType(id){ return STAGE_TYPES.find(t=>t.id===id)||STAGE_TYPES[0]; }
function getUserById(id){ return loginUsers.find(u=>u.id===id); }
function viewEnd(){ const d=new Date(viewStart); d.setMonth(d.getMonth()+6); return d; }
function viewTotalDays(){ return diffDays(viewStart,viewEnd()); }
function dateToX(date){ return Math.round(diffDays(viewStart,date)*PX_PER_DAY); }

// ═══════════════════════════════════════════════════════════
//  FIREBASE LOAD / SAVE
// ═══════════════════════════════════════════════════════════
function loadFirebase(){
  if(!db){ loadLS(); return; }
  db.ref('shc_planning/projects').on('value', snap=>{
    const raw=snap.val()||{};
    projects={};
    Object.values(raw).filter(p=>p&&p.id).forEach(p=>{ projects[p.id]=p; });
    renderAll();
  });
  db.ref('solarcrm_v2/config').once('value', snap=>{
    const cfg=snap.val()||{};
    if(cfg.users&&Array.isArray(cfg.users)&&cfg.users.length){
      loginUsers=[{id:'_admin',name:'Administrator',color:'#dc2626',password:cfg.adminPw||'12345'},...cfg.users];
    }
    if(cfg.adminPw) adminPw=cfg.adminPw;
    populateLoginUsers();
    populateStageResponsabili();
  });
}

function loadLS(){
  try{ const r=localStorage.getItem('shc_planning'); if(r) projects=JSON.parse(r); }catch(e){}
  renderAll();
}

function saveFirebase(){
  if(!db){ localStorage.setItem('shc_planning',JSON.stringify(projects)); return; }
  try{
    const updates={};
    Object.values(projects).forEach(p=>{ updates[String(p.id)]=p; });
    db.ref('shc_planning/projects').update(updates);
    // Dual-write: sincronizează etapele înapoi în proiectul SolarCRM legat (pentru afișare în CRM)
    Object.values(projects).forEach(p=>{
      if(p.crmId){
        db.ref('solarcrm_v2/projects/'+String(p.crmId)+'/stages').set(p.stages||[]).catch(()=>{});
      }
    });
  }catch(e){}
}

function deleteProjectFirebase(id){
  if(db) db.ref('shc_planning/projects/'+String(id)).remove().catch(()=>{});
  delete projects[id];
}

  if(!uid2){err.textContent='Selectează un utilizator.';return;}

function buildMonthHeaders(){
  const result=[];
  let cur=new Date(viewStart.getFullYear(),viewStart.getMonth(),1);
  const end=viewEnd();
  while(cur<end){
    const next=new Date(cur.getFullYear(),cur.getMonth()+1,1);
    const segEnd=next<end?next:end;
    const segStart=cur<viewStart?viewStart:cur;
    const days=diffDays(segStart,segEnd);
    result.push({label:cur.toLocaleDateString('ro-RO',{month:'short',year:'numeric'}),startDay:diffDays(viewStart,segStart),days:days});
    cur=next;
  }
  return result;
}

function renderGantt(){
  const table=document.getElementById('ganttTable');
  const empty=document.getElementById('ganttEmpty');
  const arr=Object.values(projects).sort((a,b)=>a.name.localeCompare(b.name,'ro'));

  if(!arr.length){table.style.display='none';empty.style.display='block';return;}
  table.style.display='';empty.style.display='none';

  const months=buildMonthHeaders();
  const totalW=viewTotalDays()*PX_PER_DAY;
  const todayX=dateToX(today());
  const todayVisible=todayX>=0&&todayX<=totalW;

  const end=new Date(viewEnd()); end.setDate(end.getDate()-1);
  document.getElementById('viewLabel').textContent=
    viewStart.toLocaleDateString('ro-RO',{month:'long',year:'numeric'})+
    ' → '+end.toLocaleDateString('ro-RO',{month:'long',year:'numeric'});

  const monthCols=months.map(m=>`<th class="gantt-th-month" style="width:${m.days*PX_PER_DAY}px;min-width:${m.days*PX_PER_DAY}px;">${m.label}</th>`).join('');

  let rows='';
  arr.forEach(p=>{
    const expanded=expandedProjects[p.id]!==false;
    const stages=p.stages||[];
    const color=p.color||'#3b82f6';
    const chevron=expanded?'▾':'▸';

    const todayTd=todayVisible?`<div class="today-line" style="left:${todayX}px;"><div class="today-label">AZI</div></div>`:'';

    rows+=`<tr class="proj-row" data-pid="${p.id}">
      <td class="gantt-td-label" style="height:36px;">
        <div class="proj-label" data-toggle="${p.id}" style="cursor:pointer;">
          <div style="width:10px;height:10px;background:${color};border-radius:50%;flex-shrink:0;"></div>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;">${p.name}</span>
          <span style="font-size:11px;color:#334155;flex-shrink:0;">${chevron}</span>
          <button class="btn btn-ghost btn-icon" data-action="add-stage" data-pid="${p.id}" title="${canEditStages()?'Adaugă etapă':'Doar Chirila / Nicoraș pot adăuga etape'}" style="flex-shrink:0;${canEditStages()?'':'opacity:.35;cursor:not-allowed;'}">+</button>
          <button class="btn btn-ghost btn-icon" data-action="edit-proj" data-pid="${p.id}" title="Editează" style="flex-shrink:0;">✎</button>
        </div>
      </td>
      <td class="gantt-td-cell" style="height:36px;position:relative;width:${totalW}px;">${todayTd}</td>
    </tr>`;

    if(expanded){
      if(!stages.length){
        rows+=`<tr><td class="gantt-td-label" style="height:30px;">
          <div class="stage-label" style="color:#334155;font-style:italic;font-size:10px;">Nicio etapă — apasă + pentru a adăuga</div>
        </td><td class="gantt-td-cell" style="height:30px;position:relative;">${todayTd}</td></tr>`;
      }
      stages.forEach((s,si)=>{
        const sType=getStageType(s.type);
        const barColor=s.status==='finalizat'?'#22c55e':s.status==='intarziat'?'#ef4444':s.status==='in_lucru'?sType.color:sType.color;
        const barOpacity=s.status==='planificat'?'0.45':'1';
        const resp=getUserById(s.responsabil);
        const respLabel=resp?resp.name.split(' ')[0]:'';
        const statusBadge=s.status==='intarziat'?'<span class="badge badge-red" style="font-size:9px;padding:1px 5px;">⚠</span>':
                          s.status==='finalizat'?'<span class="badge badge-green" style="font-size:9px;padding:1px 5px;">✓</span>':'';
        let barHtml='';
        if(s.startDate&&s.endDate){
          const sd=parseDate(s.startDate),ed=parseDate(s.endDate);
          if(sd&&ed){
            const x1=Math.max(0,dateToX(sd));
            const x2=Math.min(totalW,dateToX(ed)+PX_PER_DAY);
            const w=x2-x1;
            if(w>0) barHtml=`<div class="gantt-bar" data-action="edit-stage" data-pid="${p.id}" data-si="${si}"
              style="left:${x1}px;width:${w}px;background:${barColor};opacity:${barOpacity};"
              title="${sType.label} | ${fmtDate(sd)} – ${fmtDate(ed)} | ${respLabel}">
              ${w>55?sType.label.replace(' / Avize','').replace(' echipamente',''):''} ${w>110&&respLabel?'· '+respLabel:''}
            </div>`;
          }
        }
        rows+=`<tr data-pid="${p.id}" data-si="${si}">
          <td class="gantt-td-label" style="height:30px;">
            <div class="stage-label">
              <div style="width:7px;height:7px;background:${barColor};border-radius:2px;flex-shrink:0;"></div>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${sType.label}</span>
              ${statusBadge}
              ${resp?`<div style="width:16px;height:16px;border-radius:50%;background:${resp.color||'#3b82f6'};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0;" title="${resp.name}">${initials(resp.name)}</div>`:''}
            </div>
          </td>
          <td class="gantt-td-cell" style="height:30px;position:relative;">${todayTd}${barHtml}</td>
        </tr>`;
      });
    }
  });

  table.innerHTML=`<thead><tr>
    <th class="gantt-th-label">Proiect / Etapă</th>${monthCols}
  </tr></thead><tbody>${rows}</tbody>`;

  // Events
  table.querySelectorAll('[data-toggle]').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.dataset.action) return;
      const pid=el.dataset.toggle;
      expandedProjects[pid]=!expandedProjects[pid];
      renderAll();
    });
  });
  table.querySelectorAll('[data-action="add-stage"]').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();openStageModal(el.dataset.pid,-1);});
  });
  table.querySelectorAll('[data-action="edit-proj"]').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();openProjectModal(el.dataset.pid);});
  });
  table.querySelectorAll('[data-action="edit-stage"]').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();openStageModal(el.dataset.pid,parseInt(el.dataset.si));});
  });
}

// ── Alerts ──
function renderAlerts(){
  const banner=document.getElementById('alertBanner');
  const t=today(),soon=addDays(t,3);
  let late=0,upcoming=0;
  Object.values(projects).forEach(p=>{
    (p.stages||[]).forEach(s=>{
      if(s.status==='intarziat') late++;
      if(s.startDate){const sd=parseDate(s.startDate);if(sd&&sd>=t&&sd<=soon&&s.status==='planificat')upcoming++;}
    });
  });
  let html='';
  if(late) html+=`<span class="badge badge-red" style="cursor:pointer;" id="alertLate">⚠ ${late} etape întârziate</span>`;
  if(upcoming) html+=`<span class="badge badge-yellow" style="cursor:pointer;" id="alertUpcoming">⏰ ${upcoming} încep în 3 zile</span>`;
  banner.innerHTML=html;
  banner.style.display=html?'flex':'none';
  // Make late badge clickable
  const upcomingBadge=document.getElementById('alertUpcoming');
  if(upcomingBadge){
    upcomingBadge.addEventListener('click',()=>{
      const t=today(),soon=addDays(t,3);
      let earliest=null;
      Object.values(projects).forEach(p=>{
        const hasUpcoming=(p.stages||[]).some(s=>{
          if(!s.startDate||s.status!=='planificat') return false;
          const d=parseDate(s.startDate);
          return d&&d>=t&&d<=soon;
        });
        if(hasUpcoming){
          expandedProjects[p.id]=true;
          (p.stages||[]).forEach(s=>{
            if(s.startDate&&s.status==='planificat'){
              const d=parseDate(s.startDate);
              if(d&&d>=t&&d<=soon&&(!earliest||d<earliest)) earliest=d;
            }
          });
        }
      });
      if(earliest) viewStart=new Date(earliest.getFullYear(),earliest.getMonth()-1,1);
      renderAll();
    });
  }
  const lateBadge=document.getElementById('alertLate');
  if(lateBadge){
    lateBadge.addEventListener('click',()=>{
      let earliest=null;
      Object.values(projects).forEach(p=>{
        if((p.stages||[]).some(s=>s.status==='intarziat')){
          expandedProjects[p.id]=true;
          (p.stages||[]).forEach(s=>{
            if(s.status==='intarziat'){
              const d=parseDate(s.startDate)||parseDate(s.endDate);
              if(d&&(!earliest||d<earliest)) earliest=d;
            }
          });
        }
      });
      const target=earliest||today();
      viewStart=new Date(target.getFullYear(),target.getMonth()-1,1);
      renderAll();
      setTimeout(()=>{ document.getElementById('ganttWrap').scrollLeft=0; },50);
    });
  }
}

function renderAll(){ renderSidebar(); renderGantt(); renderAlerts(); }

function openProjectModal(pid){
  editingProjectId=pid||null;
  const p=pid?projects[pid]:null;
  document.getElementById('projectModalTitle').textContent=p?'Editează proiect':'Proiect nou';
  document.getElementById('pmName').value=p?p.name:'';
  document.getElementById('pmClient').value=p?p.client:'';
  document.getElementById('pmAddress').value=p?p.address:'';
  document.getElementById('pmKwp').value=p&&p.kwp?p.kwp:'';
  document.getElementById('pmColor').value=p?(p.color||'#3b82f6'):'#3b82f6';
  document.getElementById('pmStart').value=p?p.startDate||'':'';
  document.getElementById('pmNotes').value=p?p.notes||'':'';
  document.getElementById('btnDeleteProject').style.display=p?'inline-block':'none';
  document.getElementById('projectModal').classList.add('show');
}
function saveProject(){
  const name=document.getElementById('pmName').value.trim();
  if(!name){alert('Introduceți un nume de proiect.');return;}
  const id=editingProjectId||uid();
  const ex=projects[id]||{};
  projects[id]={...ex,id,name,
    client:document.getElementById('pmClient').value.trim(),
    address:document.getElementById('pmAddress').value.trim(),
    kwp:parseFloat(document.getElementById('pmKwp').value)||0,
    color:document.getElementById('pmColor').value,
    startDate:document.getElementById('pmStart').value,
    notes:document.getElementById('pmNotes').value.trim(),
    stages:ex.stages||[],
    createdAt:ex.createdAt||Date.now()
  };
  saveFirebase();
  document.getElementById('projectModal').classList.remove('show');
  expandedProjects[id]=true;
}

function canEditStages(){ return !!currentUser && (currentUser.id==='u_chirila'||currentUser.id==='u_nicoras'); }

function openStageModal(pid,si){
  if(!canEditStages()){
    alert('Doar Alexandru Chirila și Ionuț Nicoraș pot modifica etapele de șantier.');
    return;
  }
  editingStage={projectId:pid,stageIdx:si};
  const p=projects[pid];
  const s=si>=0?(p.stages||[])[si]:null;
  document.getElementById('smType').value=s?s.type:STAGE_TYPES[0].id;
  document.getElementById('smStart').value=s?isoToDmy(s.startDate||''):isoToDmy(toISO(today()));
  document.getElementById('smEnd').value=s?isoToDmy(s.endDate||''):isoToDmy(toISO(addDays(today(),14)));
  document.getElementById('smResp').value=s?s.responsabil||'':'';
  document.getElementById('smStatus').value=s?s.status||'planificat':'planificat';
  document.getElementById('smNotes').value=s?s.notes||'':'';
  document.getElementById('btnDeleteStage').style.display=si>=0?'inline-block':'none';
  document.getElementById('stageModal').classList.add('show');
}
function saveStage(){
  const {projectId,stageIdx}=editingStage;
  const p=projects[projectId]; if(!p) return;
  if(!p.stages) p.stages=[];
  const stage={
    id:uid(),
    type:document.getElementById('smType').value,
    startDate:dmyToIso(document.getElementById('smStart').value),
    endDate:dmyToIso(document.getElementById('smEnd').value),
    responsabil:document.getElementById('smResp').value,
    status:document.getElementById('smStatus').value,
    notes:document.getElementById('smNotes').value.trim(),
  };
  if(stageIdx>=0){stage.id=p.stages[stageIdx].id||stage.id;p.stages[stageIdx]=stage;}
  else p.stages.push(stage);
  saveFirebase();
  document.getElementById('stageModal').classList.remove('show');
}
document.getElementById('btnSaveStage').addEventListener('click',saveStage);
document.getElementById('btnDeleteStage').addEventListener('click',()=>{
  const {projectId,stageIdx}=editingStage;
  if(!confirm('Ștergi această etapă?')) return;
  projects[projectId].stages.splice(stageIdx,1);
  saveFirebase();
  document.getElementById('stageModal').classList.remove('show');
});

document.getElementById('btnPrev').addEventListener('click',()=>{
  viewStart=new Date(viewStart.getFullYear(),viewStart.getMonth()-1,1);renderGantt();
});
document.getElementById('btnNext').addEventListener('click',()=>{
  viewStart=new Date(viewStart.getFullYear(),viewStart.getMonth()+1,1);renderGantt();
});
document.getElementById('btnToday').addEventListener('click',()=>{
  const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-1); viewStart=d; renderGantt();
});
document.getElementById('btnCenterActive').addEventListener('click',()=>{
  let earliest=null;
  Object.values(projects).forEach(p=>{
    (p.stages||[]).forEach(s=>{
      if(s.startDate&&s.status!=='finalizat'){
        const d=parseDate(s.startDate);
        if(d&&(!earliest||d<earliest)) earliest=d;
      }
    });
  });
  if(!earliest){alert('Nicio etapă activă găsită.');return;}
  viewStart=new Date(earliest.getFullYear(),earliest.getMonth()-1,1);
  renderGantt();
});
document.getElementById('btnZoomIn').addEventListener('click',()=>{ PX_PER_DAY=Math.min(60,PX_PER_DAY+4); renderGantt(); });
document.getElementById('btnZoomOut').addEventListener('click',()=>{ PX_PER_DAY=Math.max(8,PX_PER_DAY-4); renderGantt(); });

// ── DATE HELPERS dd/mm/yyyy ──
function isoToDmy(s){ if(!s) return ''; const p=s.split('-'); return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:''; }
function dmyToIso(s){ if(!s) return ''; const p=s.split('/'); return p.length===3&&p[2].length===4?p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0'):''; }
function addDateMask(id){
  const el=document.getElementById(id);
  el.addEventListener('input',function(){
    const prev=this._prev||''; const cur=this.value;
    let v=cur.replace(/[^0-9\/]/g,'');
    if(prev.length<cur.length){
      const digits=v.replace(/\//g,'');
      v='';
      for(let i=0;i<Math.min(digits.length,8);i++){
        if(i===2||i===4) v+='/';
        v+=digits[i];
      }
    }
    this.value=v.slice(0,10);
    this._prev=this.value;
  });
}
addDateMask('smStart');
addDateMask('smEnd');

// ── SIDEBAR PARTICLE ANIMATION ──
(function(){
  const canvas=document.getElementById('sidebarCanvas');
  const ctx=canvas.getContext('2d');
  let W,H,particles=[];

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=36;
  }

  function mkParticle(){
    return {
      x: Math.random()*W,
      y: Math.random()*H,
      z: Math.random()*600+100, // depth 100-700
      vz: -(Math.random()*0.4+0.1), // moving toward viewer
      color: ['#3b82f6','#f59e0b','#10b981','#8b5cf6','#06b6d4','#f97316'][Math.floor(Math.random()*6)],
      pulse: Math.random()*Math.PI*2,
      pulseSpeed: Math.random()*0.02+0.01,
    };
  }

  function init(){
    resize();
    particles=[];
    for(let i=0;i<55;i++) particles.push(mkParticle());
  }

  function project(p){
    const fov=400;
    const scale=fov/(fov+p.z);
    return { x:W/2+(p.x-W/2)*scale, y:H/2+(p.y-H/2)*scale, r:Math.max(0.5,(8-p.z/100)*scale*2), scale };
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.sort((a,b)=>b.z-a.z);
    particles.forEach(p=>{
      p.z+=p.vz*2;
      p.pulse+=p.pulseSpeed;
      if(p.z<50||p.z>700){ Object.assign(p,mkParticle(),{z:650}); return; }
      const {x,y,r}=project(p);
      const pulseMod=1+Math.sin(p.pulse)*0.3;
      const rr=r*pulseMod;
      // glow
      const g=ctx.createRadialGradient(x,y,0,x,y,rr*3);
      g.addColorStop(0,p.color+'cc');
      g.addColorStop(0.4,p.color+'44');
      g.addColorStop(1,'transparent');
      ctx.beginPath();
      ctx.arc(x,y,rr*3,0,Math.PI*2);
      ctx.fillStyle=g;
      ctx.fill();
      // core
      ctx.beginPath();
      ctx.arc(x,y,rr,0,Math.PI*2);
      ctx.fillStyle=p.color;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  // Start after login when app is visible
  window.startParticles=function(){ init(); draw(); };
  // Also try on timeout as fallback
  setTimeout(()=>{ if(W===0) init(); if(H>0) draw(); },800);
})();

// ── CLOCK ──
function updateClock(){
  const now=new Date();
  const dd=String(now.getDate()).padStart(2,'0');
  const mm=String(now.getMonth()+1).padStart(2,'0');
  const yyyy=now.getFullYear();
  const d=dd+'/'+mm+'/'+yyyy;
  const t=now.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const el=document.getElementById('clockDisplay');
  if(el) el.textContent=d+' · '+t;
}
updateClock();
setInterval(updateClock,1000);
