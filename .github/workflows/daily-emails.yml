name: Notificări email zilnice SHC Solar Suite

on:
  schedule:
    # 06:00 UTC = 08:00/09:00 România (EET/EEST), luni-vineri
    - cron: '0 6 * * 1-5'
  workflow_dispatch: {}   # permite rulare manuală din tab-ul Actions, pentru testare

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Trimite emailurile zilnice
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/send-daily-emails.js
