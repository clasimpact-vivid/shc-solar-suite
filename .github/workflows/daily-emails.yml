name: Notificări email zilnice SHC Solar Suite

on:
  schedule:
    # GitHub Actions întârzie predictibil cronurile de pe ore/jumătăți fixe (congestie) —
    # programat mai devreme, cu buffer, ca livrarea efectivă să cadă pe la 07:30 România
    # 00:07 UTC = 03:07 România (EEST, vară), luni-vineri
    - cron: '7 0 * * 1-5'
  workflow_dispatch: {}   # permite rulare manuală din tab-ul Actions, pentru testare

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Trimite emailurile zilnice
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/send-daily-emails.js
