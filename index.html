  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

6,182,212,0.25);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;\">\n        <svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#06b6d4\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><polyline points=\"12 6 12 12 16 14\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:19px;color:#f1f5f9;margin-bottom:8px;\">Pontaj<\u002Fdiv>\n      <div style=\"font-size:13px;color:#64748b;line-height:1.6;margin-bottom:24px;\">Check-in/out cu GPS, listă zilnică echipă, hartă live, export CSV lunar.<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;\">\n        <span style=\"font-size:11px;font-weight:600;color:#06b6d4;background:rgba(6,182,212,0.1);padding:3px 10px;border-radius:999px;\">GPS<\u002Fspan>\n        <span style=\"font-size:11px;font-weight:600;color:#06b6d4;background:rgba(6,182,212,0.1);padding:3px 10px;border-radius:999px;\">Hartă<\u002Fspan>\n        <span style=\"font-size:11px;font-weight:600;color:#06b6d4;background:rgba(6,182,212,0.1);padding:3px 10px;border-radius:999px;\">Export CSV<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:auto;display:flex;align-items:center;gap:6px;color:#06b6d4;font-size:13px;font-weight:600;\">\n        Deschide Pontaj\n        <svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fa>\n\n  <\u002Fdiv>\n\n  <!-- Integration hint -->\n  <div style=\"margin-top:36px;max-width:560px;text-align:center;\">\n    <div style=\"display:flex;align-items:center;justify-content:center;gap:10px;color:#334155;font-size:12px;font-weight:500;\">\n      <span style=\"width:40px;height:1px;background:#1e2d45;\"><\u002Fspan>\n      <svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#475569\" stroke-width=\"2\"><path d=\"M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71\"><\u002Fpath><path d=\"M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71\"><\u002Fpath><\u002Fsvg>\n      <span style=\"color:#475569;\">Din CRM, apasă <strong style=\"color:#64748b;\">„Generează Ofertă PV-BESS\"<\u002Fstrong> în panoul unui proiect PV pentru a pre-completa oferta automat.<\u002Fspan>\n      <span style=\"width:40px;height:1px;background:#1e2d45;\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:24px;\">\n    <a href=\"#\" sc-camel-on-click=\"{{ openAuditLog }}\" style=\"font-size:12px;color:#475569;text-decoration:none;padding:6px 14px;border:1px solid #1e2d45;border-radius:8px;\">Jurnal activitate (autentificări)<\u002Fa>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:40px;font-size:11px;color:#1e2d45;\">© 2026 Smart House Color SRL · SHC Solar Suite<\u002Fdiv>\n\n  <sc-if value=\"{{ showAuditLog }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ closeAuditLog }}\" style=\"position:fixed;inset:0;background:rgba(2,6,15,0.75);z-index:9998;display:flex;align-items:center;justify-content:center;padding:24px;\">\n      <div sc-camel-on-click=\"{{ stopProp }}\" style=\"background:#0d1526;border:1px solid #1e2d45;border-radius:16px;padding:24px;max-width:640px;width:100%;max-height:80vh;display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;\">\n          <div style=\"font-weight:800;font-size:16px;color:#f1f5f9;\">Jurnal activitate — autentificări<\u002Fdiv>\n          <a href=\"#\" sc-camel-on-click=\"{{ closeAuditLog }}\" style=\"color:#64748b;text-decoration:none;font-size:13px;\">✕<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"overflow-y:auto;flex:1;\">\n          <sc-if value=\"{{ hasAuditEntries }}\" hint-placeholder-val=\"{{ true }}\">\n            <sc-for list=\"{{ auditEntries }}\" as=\"e\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex;justify-content:space-between;gap:12px;padding:9px 4px;border-bottom:1px solid #1a2540;font-size:12.5px;\">\n                <div style=\"color:#e2e8f0;font-weight:600;\">{{ e.user }}<\u002Fdiv>\n                <div style=\"color:#64748b;\">{{ e.app }}<\u002Fdiv>\n                <div style=\"color:#475569;white-space:nowrap;\">{{ e.when }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noAuditEntries }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"color:#475569;font-size:13px;text-align:center;padding:20px 0;\">Niciun login înregistrat încă.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <a href=\"#\" sc-camel-on-click=\"{{ clearAuditLog }}\" style=\"margin-top:14px;font-size:11.5px;color:#64748b;text-align:center;text-decoration:none;\">Șterge jurnalul<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst FB_CONFIG = {\n  apiKey: \"AIzaSyBVElgXbEabUcwjNMa27IEw0YkxaEaXYl0\",\n  authDomain: \"solarcrm-ba919.firebaseapp.com\",\n  databaseURL: \"https://solarcrm-ba919-default-rtdb.firebaseio.com\",\n  projectId: \"solarcrm-ba919\",\n  storageBucket: \"solarcrm-ba919.firebasestorage.app\",\n  messagingSenderId: \"349523166308\",\n  appId: \"1:349523166308:web:0533aa1dae74f9a0b3cb71\"\n};\nfunction getShcDb(){\n  try{\n    if(typeof firebase==='undefined') return null;\n    if(!firebase.apps.length) firebase.initializeApp(FB_CONFIG);\n    return firebase.database();\n  }catch(e){ return null; }\n}\n\nclass Component extends DCLogic {\n  state = { showAuditLog:false, remoteEntries:null };\n\n  loadLocalAudit(){\n    try{ return JSON.parse(localStorage.getItem('shc_audit_log')||'[]'); }catch(e){ return []; }\n  }\n\n  fetchRemoteAudit(){\n    const db=getShcDb();\n    if(!db){ return; }\n    db.ref('solarcrm_v2/audit_log').limitToLast(300).once('value', snap=>{\n      const val=snap.val()||{};\n      const arr=Object.keys(val).map(k=>val[k]);\n      this.setState({remoteEntries:arr});\n    }, ()=>{ /* offline/blocked — fall back to local below */ });\n  }\n\n  renderVals(){\n    const raw = this.state.remoteEntries!==null ? this.state.remoteEntries : this.loadLocalAudit();\n    const entries=raw.slice().sort((a,b)=>b.t-a.t).map(e=>({\n      user:e.user||'?',\n      app:e.app||'',\n      when:new Date(e.t).toLocaleString('ro-RO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})\n    }));\n    return {\n      showAuditLog:this.state.showAuditLog,\n      openAuditLog:(ev)=>{ ev.preventDefault(); this.setState({showAuditLog:true}); this.fetchRemoteAudit(); },\n      closeAuditLog:(ev)=>{ if(ev&&ev.preventDefault) ev.preventDefault(); this.setState({showAuditLog:false}); },\n      stopProp:(ev)=>{ ev.stopPropagation(); },\n      clearAuditLog:(ev)=>{\n        ev.preventDefault();\n        localStorage.removeItem('shc_audit_log');\n        const db=getShcDb(); if(db) db.ref('solarcrm_v2/audit_log').remove();\n        this.setState({remoteEntries:[]});\n      },\n      auditEntries:entries,\n      hasAuditEntries:entries.length>0,\n      noAuditEntries:entries.length===0,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
