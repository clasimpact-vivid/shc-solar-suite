document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

dth:92vw!important;}\n  .crm-usermgmt-modal{width:96vw!important;max-width:96vw!important;}\n  /* Stats cards 2 col */\n  .crm-stats-grid{grid-template-columns:1fr 1fr!important;}\n  /* Form rows stack */\n  .crm-form-row{flex-direction:column!important;}\n  /* User switcher — hide name, show only avatar */\n  .crm-username-label{display:none!important;}\n  /* Buton + pe mobil */\n  .crm-new-icon{display:inline!important;font-size:18px;font-weight:700;line-height:1;}\n  /* Reports */\n  .crm-reports-grid{grid-template-columns:1fr!important;}\n  /* Filter bar */\n  .crm-filter-bar{overflow-x:auto;-webkit-overflow-scrolling:touch;}\n  /* Table → carduri pe mobil */\n  .crm-table-desktop{display:none!important;}\n  .crm-mobile-cards{display:block!important;}\n  /* Topbar: compactăm etichetele text, păstrăm iconițele */\n  .crm-username-label, .crm-btn-label{display:none!important;}\n  .crm-new-icon{display:inline!important;}\n  .crm-topbar button{padding:7px 9px!important;}\n  .crm-topbar{padding:0 8px!important;gap:4px!important;}\n}\n/* iOS Safari: elementele clicabile (div-uri fără href/button) sunt tratate ca text selectabil,\n   iar long-press deschide meniul Copy/Look Up în loc să declanșeze onClick. Dezactivăm explicit. */\n[onclick], [style*=\"cursor:pointer\"], [style*=\"cursor: pointer\"] {\n  -webkit-touch-callout: none;\n  -webkit-user-select: none;\n  user-select: none;\n  -webkit-tap-highlight-color: rgba(0,0,0,0.06);\n}\n.crm-mobile-cards{display:none;}\n[style*=\"cursor:pointer\"]:active, [style*=\"cursor: pointer\"]:active { filter:brightness(0.93); }\n<\u002Fstyle>\n<script src=\"89ff77cf-449c-4449-817b-cf6f13c5056e\"><\u002Fscript>\n<script src=\"a3d782ee-fa9a-442f-aeba-1f5df97c75d9\"><\u002Fscript>\n<script>\n// Diagnostic vizibil: dacă apare o eroare JS pe telefon (unde nu poți deschide consola),\n// afișăm un banner roșu în loc să înghețe ecranul fără niciun indiciu.\n(function(){\n  function showBootError(msg){\n    // Ignoră erorile inofensive ale bridge-ului intern de editare (nu există\n    // în deployment standalone, dar nu afectează funcționarea aplicației).\n    if(/reading '(emit|addListener|removeListener|postMessage)'/.test(msg)) return;\n    let el=document.getElementById('__bootErrBanner');\n    if(!el){\n      el=document.createElement('div');\n      el.id='__bootErrBanner';\n      el.style.cssText='position:fixed;top:0;left:0;right:0;z-index:999999;background:#dc2626;color:#fff;padding:10px 14px;font:11px/1.4 monospace;white-space:pre-wrap;max-height:45vh;overflow:auto;';\n      document.body.appendChild(el);\n    }\n    el.textContent += (el.textContent?'\\n\\n':'')+msg;\n  }\n  window.addEventListener('error',function(e){ showBootError('Eroare: '+(e.message||String(e.error||e))+' @ '+(e.filename||'')+':'+(e.lineno||'')); });\n  window.addEventListener('unhandledrejection',function(e){ showBootError('Promise respinsă: '+((e.reason&&e.reason.message)||e.reason)); });\n})();\n<\u002Fscript>\n\n<\u002Fhelmet>\n\n\n<div style=\"display:flex;height:100vh;overflow:hidden;\">\n\n<!-- SIDEBAR -->\n<aside class=\"crm-sidebar {{ mobileSidebarClass }}\" style=\"width:220px;flex:none;background:#0f1729;display:flex;flex-direction:column;overflow:hidden;padding-bottom:32px;\">\n  <div style=\"padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.07);\">\n    <div style=\"display:flex;align-items:center;gap:10px;\">\n      <div style=\"width:34px;height:34px;background:linear-gradient(135deg,#f59e0b,#f97316);border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 2px 8px rgba(249,115,22,0.4);\">\n        <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2L14.09 8.26L21 9.27L16.5 13.64L17.82 20.52L12 17.27L6.18 20.52L7.5 13.64L3 9.27L9.91 8.26L12 2Z\" fill=\"white\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:0;\">\n        <div style=\"color:#f8fafc;font-weight:700;font-size:15p e},\n  agent:{appCrm:true,appCalculator:true,appPlanificare:false,appVizita:false,appPontaj:true},\n  birou:{appCrm:true,appCalculator:true,appPlanificare:true,appVizita:true,appPontaj:true},\n};\nconst EMPTY_UM_FORM = {name:'',email:'',role:'Tehnician',password:'',password2:'',oldPw:'',pin:'',isSuperAdmin:false,segPV:true,segInverter:true,segBaterie:true,segBESS:false,notifSolarCRM:true,notifPlanificare:false,notifVizita:false,notifPontaj:false,roleTemplate:'birou',appCrm:true,appCalculator:true,appPlanificare:true,appVizita:true,appPontaj:true};\nfunction genUniquePin5(existingUsers){ let p; const used=new Set((existingUsers||[]).map(u=>u.pin).filter(Boolean)); do{ p=String(Math.floor(1000+Math.random()*9000)); }while(used.has(p)); return p; }\n\n// ─── HELPERS ─────────────────────────────────────────────────────────────────\nfunction initials(name){ return (name||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?'; }\nfunction fmtSize(b){ if(b<1024)return b+' B'; if(b<1048576)return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(1)+' MB'; }\nfunction timeAgo(iso){\n  if(!iso)return '';\n  const ms=Date.now()-new Date(iso).getTime(),sec=Math.floor(ms/1000);\n  if(sec<60)return 'acum câteva secunde';\n  const min=Math.floor(sec/60); if(min<60)return 'acum '+min+(min===1?' minut':' minute');\n  const hr=Math.floor(min/60); if(hr<24)return 'acum '+hr+(hr===1?' oră':' ore');\n  const day=Math.floor(hr/24); if(day<30)return 'acum '+day+(day===1?' zi':' zile');\n  return new Date(iso).toLocaleDateString('ro-RO',{day:'2-digit',month:'short',year:'numeric'});\n}\nfunction fmtDate(iso){\n  if(!iso||iso==='—')return '—';\n  const s=String(iso); const p=s.split('-');\n  if(p.length!==3||!p[0]||p[0].length!==4)return s||'—';\n  return p[2]+'-'+p[1]+'-'+p[0];\n}\nfunction fmtTypes(types){\n  if(!types||types.length===0)return {typeLabel:'—',typeBg:'#f1f5f9',typeColor:'#475569'};\n  if(types.length===1){const c=TYPE_COLORS[types[0]]||{};return {typeLabel:types[0],typeBg:c.bg||'#f1f5f9',typeColor:c.color||'#475569'};}\n  return {typeLabel:types.join('+'),typeBg:'#f8fafc',typeColor:'#374151'};\n}\nfunction migrate(p){\n  return {...p,types:p.types||(p.type?[p.type]:['PV']),responsabil:p.responsabil||p.technician||null,date_executie:p.date_executie||null,date_inserted:p.date_inserted||p.date_start||new Date().toISOString().slice(0,10),auditLog:p.auditLog||[],attachments:p.attachments||[],bessKwh:p.bessKwh||null,capexBESS:p.capexBESS||null,capexSTS:p.capexSTS||null};\n}\n\nfunction buildContractHTML(p, company) {\n  const nr = p.id + '/' + new Date().getFullYear();\n  const today = fmtDate(new Date().toISOString().slice(0,10));\n  const types = (p.types||[]).join(', ');\n  const valFmt = p.value ? p.value.toLocaleString('ro-RO') : '—';\n  const valTVA = p.value ? Math.round(p.value*1.19).toLocaleString('ro-RO') : '—';\n  const pvSection = (p.types||[]).includes('PV') ? `\n    <tr><td class=\"lbl\">Putere instalată<\u002Ftd><td>${p.kwp||'—'} kWp (${p.panels||'—'} panouri)<\u002Ftd><\u002Ftr>\n    <tr><td class=\"lbl\">Tip montaj<\u002Ftd><td style=\"text-transform:capitalize\">${p.mounting||'—'}<\u002Ftd><\u002Ftr>\n    <tr><td class=\"lbl\">Prosumator<\u002Ftd><td>${p.prosumator?'Da':'Nu'}<\u002Ftd><\u002Ftr>` : '';\n  const regCom = company.regCom ? `, Nr. Reg. Com.: ${company.regCom}` : '';\n  const repLine = (company.repName) ? `, reprezentată prin <strong>${company.repName}<\u002Fstrong>${company.repRole?', '+company.repRole:''}` : '';\n  return `<!DOCTYPE html><html lang=\"ro\"><head><meta charset=\"utf-8\"><title>Contract ${nr}<\u002Ftitle>\n<style>\n*{box-sizing:border-box;margin:0;padding:0;}\nbody{font-family:'Times New Roman',serif;font-size:12pt;line-height:1.7;color:#000;padding:2.5cm 2.5cm 3cm;}\nh1{text-align:center;font-size:13pt;margin-bottom:4pt;letter-spacing:1px;}\nh2{font-size:11pt;margin:18pt 0 6pt;text-transform:uppercase;border-bottom:1px solid #000;padding-bottom:3pt;}\np{margin-bottom:5pt;text-align:justify;}\ntable{width:100%;border-collapse:collapse;margin:8pt 0;}\ntd{padding:4pt 8pt;border:1px solid #666;font-size:11pt;vertical-align:top;}\n.lbl{font-weight:bold;width:200px;background:#f5f5f5;}\n.sigs{display:flex;justify-content:space-between;margin-top:50pt;}\n.sig{text-align:center;width:44%;}\n.sigline{border-top:1px solid #000;padding-top:4pt;margin-top:48pt;font-size:10pt;}\n@media print{@page{margin:2cm;size:A4;}}\n<\u002Fstyle><\u002Fhead><body>\n<h1>CONTRACT DE PRESTĂRI SERVICII<\u002Fh1>\n<h1>Instalare Sistem Fotovoltaic / Energetic<\u002Fh1>\n<p style=\"text-align:center;margin:8pt 0 18pt;font-size:11pt;\">Nr. <strong>${nr}<\u002Fstrong> din data <strong>${today}<\u002Fstrong><\u002Fp>\n\n<h2>Capitolul I – Părțile contractante<\u002Fh2>\n<p>Art. 1. <strong>${company.name}<\u002Fstrong>, CUI: ${company.cui}${regCom}, cu sediul în ${company.address}, tel: ${company.phone}, email: ${company.email}${repLine}, denumită în continuare <strong>PRESTATOR<\u002Fstrong>,<\u002Fp>\n<p>și<\u002Fp>\n<p>Art. 2. <strong>${p.client||'—'}<\u002Fstrong>, domiciliat/ă în <strong>${p.address||'—'}<\u002Fstrong>, tel: ${p.phone||'—'}, email: ${p.email||'—'}, denumit/ă în continuare <strong>BENEFICIAR<\u002Fstrong>.<\u002Fp>\n\n<h2>Capitolul II – Obiectul contractului<\u002Fh2>\n<p>Art. 3. Prestatorul se obligă să execute lucrările de instalare sistem <strong>${types}<\u002Fstrong> la adresa indicată de beneficiar, conform specificațiilor tehnice agreate.<\u002Fp>\n<table>\n  <tr><td class=\"lbl\">Echipamente<\u002Ftd><td>${p.equipment||'Conform ofertei tehnice'}<\u002Ftd><\u002Ftr>\n  ${pvSection}\n  <tr><td class=\"lbl\">Adresa instalare<\u002Ftd><td>${p.address||'—'}<\u002Ftd><\u002Ftr>\n  <tr><td class=\"lbl\">Responsabil lucrare<\u002Ftd><td>${p.responsabil||'—'}<\u002Ftd><\u002Ftr>\n<\u002Ftable>\n\n<h2>Capitolul III – Valoarea și plata<\u002Fh2>\n<p>Art. 4. Valoarea totală a contractului: <strong>${valFmt} RON fără TVA<\u002Fstrong> (TVA 19% = ${p.value?Math.round(p.value*0.19).toLocaleString('ro-RO'):'—'} RON).<\u002Fp>\n<p>Total cu TVA: <strong>${valTVA} RON<\u002Fstrong>.<\u002Fp>\n<p>Art. 5. Modalitate de plată: 50% avans la semnarea contractului, 50% la recepția și punerea în funcțiune a instalației.<\u002Fp>\n<p>Cont bancar Prestator: ${company.iban}, ${company.bank}.<\u002Fp>\n\n<h2>Capitolul IV – Termene de execuție<\u002Fh2>\n<p>Art. 6. Termenul de execuție: ${p.date_executie ? '<strong>'+fmtDate(p.date_executie)+'<\u002Fstrong>' : '___ zile lucrătoare de la plata avansului'}.<\u002Fp>\n<p>Art. 7. Data semnării contractului: <strong>${fmtDate(p.date_start)||today}<\u002Fstrong>.<\u002Fp>\n\n<h2>Capitolul V – Obligațiile prestatorului<\u002Fh2>\n<p>Art. 8. Prestatorul se obligă: a) Să execute lucrările conform normativelor tehnice în vigoare; b) Să utilizeze echipamente cu certificate de conformitate CE; c) Să acorde garanție <strong>2 ani<\u002Fstrong> pentru lucrările de montaj; d) Să asiste la obținerea avizelor de prosumator (dacă este cazul).<\u002Fp>\n\n<h2>Capitolul VI – Obligațiile beneficiarului<\u002Fh2>\n<p>Art. 9. Beneficiarul se obligă: a) Să asigure accesul nestingherit la locul de instalare; b) Să achite contravaloarea conform art. 5; c) Să nu intervină asupra instalației pe perioada de garanție fără acordul prestatorului.<\u002Fp>\n\n<h2>Capitolul VII – Garanții<\u002Fh2>\n<p>Art. 10. Echipamentele beneficiază de garanție conform specificațiilor producătorilor: minimum <strong>10 ani panouri<\u002Fstrong>, <strong>5 ani invertor<\u002Fstrong>, <strong>10 ani baterii<\u002Fstrong>. Garanție montaj: 2 ani.<\u002Fp>\n\n<h2>Capitolul VIII – Dispoziții finale<\u002Fh2>\n<p>Art. 11. Prezentul contract este guvernat de legislația română. Litigiile se soluționează pe cale amiabilă sau la instanțele judecătorești competente.<\u002Fp>\n<p>Art. 12. Prezentul contract s-a încheiat în data de <strong>${today}<\u002Fstrong>, în două exemplare originale, câte unul pentru fiecare parte.<\u002Fp>\n\n<div class=\"sigs\">\n  <div class=\"sig\">\n    <div><strong>${company.name}<\u002Fstrong><\u002Fdiv>\n    ${company.repName?`<div style=\"font-size:10pt\">${company.repName}${company.repRole?', '+company.repRole:''}<\u002Fdiv>`:''}\n    <div class=\"sigline\">Semnătură și ștampilă PRESTATOR<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"sig\">\n    <div><strong>${p.client||'BENEFICIAR'}<\u002Fstrong><\u002Fdiv>\n    <div class=\"sigline\">Semnătură BENEFICIAR<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fbody><\u002Fhtml>`;\n}\n\n// ─── COMPONENT ───────────────────────────────────────────────────────────────\nclass Component extends DCLogic {\n  state = {\n    mobileSidebarOpen: false,\n    view:'table', filterType:'all', filterStatus:'all', search:'',\n    selectedId:null, detailTab:'info',\n    showModal:false, editingId:null, form:{...EMPTY_FORM},\n    projects:[],\n    currentUser:null, users:[...DEFAULT_USERS],\n    showUserModal:false, userModalMode:'login',\n    pwStep:null, pwInput:'',\n    pinMode:true, pinBuffer:'', pinErr:false,\n    statusModal:{show:false,projectId:null,newStatus:'',reason:''},\n    showUserMgmt:false, userMgmtMode:'list', editingUserId:null,\n    umForm:{...EMPTY_UM_FORM},\n    companyInfo:{...COMPANY_INFO},\n    showFollowUpForm:false, fuNoteInput:'', fuDateInput:'', fuDateInputDmy:'',\n    followUpFilterOn:false,\n  };\n\n  adminPassword = ADMIN_DEFAULT_PW;\n  adminPin = '1000';\n\n  _startParticles(){\n    // dezactivăm animația decorativă pe mobil — poate încărca inutil CPU-ul pe telefoane mai vechi\n    if(window.innerWidth<=768) return;\n    setTimeout(()=>{\n      const canvas=document.getElementById('crmParticleCanvas');\n      if(!canvas||canvas._particlesStarted) return;\n      canvas._particlesStarted=true;\n      const ctx=canvas.getContext('2d');\n      let W,H,particles=[];\n      function resize(){ const r=canvas.parentElement.getBoundingClientRect(); W=canvas.width=Math.max(r.width||window.innerWidth,50); H=canvas.height=32; }\n      function mkParticle(){\n        return { x:Math.random()*W, y:Math.random()*H, z:Math.random()*600+100, vz:-(Math.random()*0.4+0.1),\n          color:['#3b82f6','#f59e0b','#10b981','#8b5cf6','#06b6d4','#f97316'][Math.floor(Math.random()*6)],\n          pulse:Math.random()*Math.PI*2, pulseSpeed:Math.random()*0.02+0.01 };\n      }\n      function init(){ resize(); particles=[]; for(let i=0;i<55;i++) particles.push(mkParticle()); }\n      function project(p){ const fov=400; const scale=fov/(fov+p.z); return { x:W/2+(p.x-W/2)*scale, y:H/2+(p.y-H/2)*scale, r:Math.max(0.5,(8-p.z/100)*scale*2) }; }\n      function draw(){\n        if(!document.body.contains(canvas)) return;\n        ctx.clearRect(0,0,W,H);\n        particles.sort((a,b)=>b.z-a.z);\n        particles.forEach(p=>{\n          p.z+=p.vz*2; p.pulse+=p.pulseSpeed;\n          if(p.z<50||p.z>700){ Object.assign(p,mkParticle(),{z:650}); return; }\n          const {x,y,r}=project(p);\n          const pulseMod=1+Math.sin(p.pulse)*0.3;\n          const rr=r*pulseMod;\n          const g=ctx.createRadialGradient(x,y,0,x,y,rr*3);\n          g.addColorStop(0,p.color+'cc'); g.addColorStop(0.4,p.color+'44'); g.addColorStop(1,'transparent');\n          ctx.beginPath(); ctx.arc(x,y,rr*3,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();\n          ctx.beginPath(); ctx.arc(x,y,rr,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill();\n        });\n        requestAnimationFrame(draw);\n      }\n      init(); draw();\n      window.addEventListener('resize',resize);\n      setTimeout(resize,300);\n    },150);\n  }\n\n  componentDidMount(){\n    this._startParticles();\n    this.shcResetIdle();\n    ['click','keydown','mousemove','touchstart','scroll'].forEach(ev=>document.addEventListener(ev,()=>this.shcResetIdle(),{passive:true}));\n    this._fbInitAttempts = 0;\n    this._tryConnectFirebase();\n  }\n\n  _tryConnectFirebase(){\n    const db = getDb();\n    if(!db){\n      // SDK-ul Firebase (script extern) încă nu s-a încărcat — reîncearcă în loc să renunți definitiv\n      this._fbInitAttempts = (this._fbInitAttempts||0) + 1;\n      if(this._fbInitAttempts < 40){ setTimeout(()=>this._tryConnectFirebase(), 250); return; }\n      this._loadFromLS();\n      return;\n    }\n    // Fallback dacă Firebase nu răspunde în timp util (rețea mobilă lentă/blocată) —\n    // afișăm autentificarea din datele locale în loc să înghețe ecranul la nesfârșit\n    this._fbTimeout = setTimeout(()=>{\n      if(!this._initialized) this._loadFromLS();\n    }, 5000);\n    this._fbRef = db.ref('solarcrm_v2');\n    this._fbRef.on('value', snap => {\n      clearTimeout(this._fbTimeout);\n      this._firebaseLoaded = true;\n      const data = snap.val() || {};\n      // Suporta atat structura noua (data.projects obiect, data.config) cat si veche (data.projects array, data.users)\n      let projects;\n      const rawP = data.projects;\n      if(rawP && typeof rawP === 'object'){\n        const arr = Array.isArray(rawP) ? rawP : Object.values(rawP);\n        projects = arr.filter(p=>p!=null&&typeof p==='object').map(migrate);\n      } else {\n        projects = [];\n      }\n      projects.sort((a,b)=>b.id-a.id);\n      const cfg = data.config||{};\n      const users = (cfg.users&&cfg.users.length)?cfg.users:(data.users&&data.users.length?data.users:DEFAULT_USERS);\n      const adminPw = cfg.adminPw||data.adminPw||null;\n      if(adminPw) this.adminPassword = adminPw;\n      const adminPin = cfg.adminPin||data.adminPin||null;\n      if(adminPin) this.adminPin = adminPin;\n      const ci = cfg.companyInfo||data.companyInfo||null;\n      const companyInfo = ci ? {...COMPANY_INFO,...ci} : this.state.companyInfo;\n      if(!this._initialized){\n        this._initialized=true;\n        clearTimeout(this._fbTimeout);\n        this.setState({projects,users,companyInfo},()=>this._initAuth());\n      } else {\n        this.setState({projects,users,companyInfo});\n      }\n    }, ()=>{ clearTimeout(this._fbTimeout); this._loadFromLS(); });\n  }\n\n  componentWillUnmount(){ if(this._fbRef) this._fbRef.off(); if(this._fbTimeout) clearTimeout(this._fbTimeout); }\n\n  _initAuth(){\n    this.setState({showUserModal:true,userModalMode:'login'});\n  }\n\n  _loadFromLS(){\n    if(this._initialized) return;\n    this._initialized=true;\n    try {\n      const raw=localStorage.getItem('solarcrm_v3');\n      if(raw){\n        const data=JSON.parse(raw);\n        const projects=(data.projects||[]).map(migrate);\n        const users=data.users&&data.users.length?data.users:DEFAULT_USERS;\n        if(data.adminPw) this.adminPassword=data.adminPw;\n        if(data.adminPin) this.adminPin=data.adminPin;\n        const companyInfo=data.companyInfo?{...COMPANY_INFO,...data.companyInfo}:this.state.companyInfo;\n        this.setState({projects,users,companyInfo},()=>this._initAuth());\n      } else { this.setState({projects:[],users:[...DEFAULT_USERS]},()=>this._initAuth()); }\n    } catch(e){ this._initAuth(); }\n  }\n\n  persist(){\n    try {\n      const {projects,users,companyInfo}=this.state;\n      localStorage.setItem('solarcrm_v3',JSON.stringify({projects,users,adminPw:this.adminPassword,adminPin:this.adminPin,companyInfo}));\n      if(this._firebaseLoaded){\n        const db=getDb(); if(!db) return;\n        // Salveaza fiecare proiect individual — NU suprascrie proiectele colegilor\n        const updates={};\n        projects.forEach(p=>{ updates[String(p.id)]=p; });\n        db.ref('solarcrm_v2/projects').update(updates);\n        // Config separat\n        db.ref('solarcrm_v2/config').set({users,adminPw:this.adminPassword,adminPin:this.adminPin,companyInfo});\n      }\n    } catch(e){}\n  }\n\n  _fbDeleteProject(id){\n    try {\n      if(this._firebaseLoaded){ const db=getDb(); if(db) db.ref('solarcrm_v2/projects/'+String(id)).remove(); }\n    } catch(e){}\n  }\n\n  getPreFiltered(){\n    const {projects,filterType,search,currentUser}=this.state;\n    const q=search.trim().toLowerCase();\n    const isSuper = !currentUser || currentUser.isAdmin || currentUser.isSuperAdmin;\n    const allowedSeg = currentUser&&currentUser.segmente ? currentUser.segmente : null;\n    return projects.filter(p=>{\n      if(!isSuper&&allowedSeg){\n        const types=p.types||[p.type||''];\n        const visible=types.some(t=>allowedSeg.includes(t));\n        if(!visible) return false;\n      }\n      if(filterType!=='all'){ const types=p.types||[p.type||'']; if(!types.includes(filterType))return false; }\n      if(q){ const hay=[p.client,p.address,p.equipment,p.responsabil,p.notes].filter(Boolean).join(' ').toLowerCase(); if(!hay.includes(q))return false; }\n      return true;\n    });\n  }\n  getFiltered(){\n    const {filterStatus,followUpFilterOn,currentUser}=this.state;\n    const pre=this.getPreFiltered();\n    let res=filterStatus==='all'?pre:pre.filter(p=>p.status===filterStatus);\n    if(followUpFilterOn){\n      const isFullAccess=!!(currentUser&&(currentUser.isAdmin||currentUser.id==='u_chirila'||currentUser.id==='u_nicoras'));\n      const today0=new Date(); today0.setHours(0,0,0,0);\n      res=res.filter(p=>{\n        if(!p.nextFollowUp)return false;\n        if(!['Lead','Ofertă','Contract'].includes(p.status))return false;\n        if(!isFullAccess && currentUser && (p.responsabil||'').trim().toLowerCase()!==(currentUser.name||'').trim().toLowerCase())return false;\n        return new Date(p.nextFollowUp+'T00:00:00')<today0;\n      });\n    }\n    return res;\n  }\n\n  fmt(p){\n    const tf=fmtTypes(p.types||[p.type]);\n    const sc=STATUS_COLORS[p.status]||STATUS_COLORS.Lead;\n    return {...tf,statusBg:sc.statusBg,statusColor:sc.statusColor,valueFormatted:p.value!=null?p.value.toLocaleString('ro-RO')+' RON':'—',addressShort:p.address||'—',responsabilShort:p.responsabil||'—',dateExec:fmtDate(p.date_executie)||'—',onClick:()=>this.setState({selectedId:p.id,detailTab:'info'})};\n  }\n  setForm(k,v){ this.setState(s=>({form:{...s.form,[k]:v}})); }\n\n  buildAuditEntry(action,description,reason=null){\n    const {currentUser}=this.state;\n    return {id:Date.now()+Math.random(),timestamp:new Date().toISOString(),userName:currentUser?currentUser.name:'Necunoscut',userId:currentUser?currentUser.id:null,userColor:currentUser?currentUser.color:'#94a3b8',action,description,reason};\n  }\n\n  handleSave(){\n    const {form,editingId}=this.state;\n    if(!form.client.trim()){window.alert('Numele clientului este obligatoriu!');return;}\n    const types=[]; if(form.typePV)types.push('PV'); if(form.typeInverter)types.push('Inverter'); if(form.typeBaterie)types.push('Baterie'); if(form.typeBESS)types.push('BESS'); if(types.length===0)types.push('PV');\n    const hasPV=types.includes('PV');\n    const data={types,status:form.status,client:form.client.trim(),phone:form.phone.trim()||null,email:form.email.trim()||null,address:form.address.trim()||null,value:form.value!==''?parseFloat(form.value):null,responsabil:form.responsabil.trim()||null,date_start:form.date_start||null,date_executie:form.date_executie||null,date_end:form.date_end||null,equipment:form.equipment.trim()||null,kwp:hasPV&&form.kwp!==''?parseFloat(form.kwp):null,panels:hasPV&&form.panels!==''?parseInt(form.panels):null,mounting:hasPV?(form.mounting||null):null,prosumator:hasPV?!!form.prosumator:false,notes:form.notes.trim()||null,bessKwh:form.bessKwh!==''?parseFloat(form.bessKwh):null,capexBESS:form.capexBESS!==''?parseFloat(form.capexBESS):null,capexSTS:form.capexSTS!==''?parseFloat(form.capexSTS):null};\n    this.setState(s=>{\n      let projects;\n      if(editingId){\n        const old=s.projects.find(p=>p.id===editingId)||{};\n        const changed=[]; const LABELS={status:'Status',client:'Client',responsabil:'Responsabil',value:'Valoare',date_executie:'Data exec.',address:'Adresă',equipment:'Echipamente'};\n        Object.keys(LABELS).forEach(k=>{ if(String(old[k]||'')!==String(data[k]||''))changed.push(LABELS[k]); });\n        const entry=this.buildAuditEntry('edit',changed.length
