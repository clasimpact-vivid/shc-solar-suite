<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rezumat Zilnic — SHC Solar Suite</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:#0c1526;color:#e2e8f0;min-height:100vh;}
a{color:#f59e0b;}
.wrap{max-width:820px;margin:0 auto;padding:32px 20px 60px;padding-bottom:92px;}
.top{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
.top img{width:44px;height:44px;border-radius:10px;background:#fff;padding:4px;object-fit:contain;}
.backbtn{font-size:12.5px;color:#64748b;text-decoration:none;border:1px solid #1e2d45;padding:6px 12px;border-radius:8px;}
.datebar{background:#111d35;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 14px;margin-bottom:16px;}
.datebar-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap;row-gap:8px;}
.datebar-row + .datebar-row{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06);}
.datebar input[type=date]{position:absolute;opacity:0;width:1px;height:1px;pointer-events:none;}
.tb-group{display:flex;align-items:center;gap:2px;}
.tb-div{width:1px;align-self:stretch;background:rgba(255,255,255,.08);margin:0 12px;}
.seg{display:flex;background:#0a1220;border-radius:9px;padding:3px;gap:2px;}
.seg button{border:none;background:transparent;color:#8291a8;font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:7px;cursor:pointer;transition:.15s;}
.seg button.active{background:#f59e0b;color:#1a1204;}
.seg button:not(.active):hover{color:#cbd5e1;}
.iconbtn{background:transparent;border:none;color:#8291a8;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.iconbtn:hover{background:#0a1220;color:#e2e8f0;}
.datepick-display{background:transparent;color:#e2e8f0;border:none;padding:7px 10px;font-size:13px;font-weight:600;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:7px;}
.datepick-display:hover{background:#0a1220;}
.datepick-display .cal-ic{opacity:.55;font-size:13px;}
.datepick-wrap{position:relative;display:inline-block;}
.todaylink{background:transparent;border:none;color:#f59e0b;font-size:12.5px;font-weight:600;padding:7px 10px;border-radius:8px;cursor:pointer;}
.todaylink:hover{background:rgba(245,158,11,.1);}
.dateRangeLbl{font-size:12.5px;color:#64748b;padding:0 4px;}
.agentSel{background:#0a1220;color:#cbd5e1;border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 12px;font-size:12.5px;height:34px;}
.printbtn{background:#0a1220;border:1px solid rgba(255,255,255,.08);color:#cbd5e1;border-radius:8px;padding:0 14px;height:34px;cursor:pointer;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px;}
.printbtn:hover{border-color:rgba(245,158,11,.4);color:#f59e0b;}
.trendbar{background:#111d35;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 20px;margin-bottom:16px;}
.trendbar .trendhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.trendbar .trendtitle{font-size:12.5px;color:#94a3b8;font-weight:600;}
.trendcol{display:flex;flex-direction:column;align-items:center;}
.cmp{font-size:12.5px;color:#94a3b8;}
.cmp b{color:#f1f5f9;}
.cmp .up{color:#fbbf24;font-weight:700;}
.cmp .down{color:#64748b;font-weight:700;}
.datebox{font-size:10.5px;color:#f59e0b;font-weight:600;margin-right:6px;}
.section{background:#111d35;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px 22px;margin-bottom:16px;}
.section h3{font-size:14px;color:#f59e0b;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
.section li{font-size:13px;color:#cbd5e1;line-height:1.5;padding-bottom:8px;border-bottom:1px solid #1a2540;}
.section li:last-child{border-bottom:none;padding-bottom:0;}
.section li strong{color:#f1f5f9;}
.muted{color:#64748b;}
.empty{text-align:center;color:#475569;font-size:13px;padding:40px 0;}
.loading{text-align:center;color:#64748b;font-size:13px;padding:60px 0;}
.badge-late{color:#f87171;font-weight:600;}
.badge-up{color:#fbbf24;font-weight:600;}
@media print{
  .backbtn,.iconbtn,.todaylink,.printbtn,.agentSel,.seg,.tb-div{display:none!important;}
  #particleFooter{display:none!important;}
  body{background:#fff;color:#111;}
  .section,.trendbar,.datebar{background:#fff;border-color:#ddd;}
  .section li{color:#111;border-color:#eee;}
  .muted{color:#555;}
}
</style>
</head>

      <div style="font-weight:800;font-size:18px;">Rezumat Zilnic</div>
      <div class="muted" style="font-size:12px;">SHC Solar Suite</div>
    </div>
    <a href="./index.html" class="backbtn" style="margin-left:auto;">← Pagina principală</a>
  </div>

  <div class="datebar">
    <div class="datebar-row">
      <div class="tb-group">
        <div class="seg">
          <button class="active" id="modeDay">Zi</button>
          <button id="modeWeek">Săptămână</button>
        </div>
      </div>
      <div class="tb-div"></div>
      <div class="tb-group">
        <button class="iconbtn" id="prevDay">‹</button>
        <div class="datepick-wrap">
          <div class="datepick-display" id="datePickDisplay"><span class="cal-ic">📅</span><span id="datePickText"></span></div>
          <input type="date" id="datePick">
        </div>
        <button class="iconbtn" id="nextDay">›</button>
        <button class="todaylink" id="todayBtn">Azi</button>
      </div>
      <div id="dateLabel" class="dateRangeLbl"></div>
    </div>
    <div class="datebar-row" style="justify-content:flex-end;">
      <select class="agentSel" id="agentSel">
        <option value="">Toți agenții</option>
      </select>
      <button class="printbtn" id="printBtn">🖨 Export / Print</button>
    </div>
  </div>

  <div class="trendbar">
    <div class="trendhead">
      <div class="trendtitle">📈 Linie productivitate — 7 zile</div>
      <div id="cmpWrap"></div>
    </div>
    <svg id="prodLine" width="100%" height="70" viewBox="0 0 700 70" preserveAspectRatio="none" style="display:block;"></svg>
  </div>

  <div id="noActivityWrap"></div>
  <div id="content"><div class="loading">Se încarcă...</div></div>
  <div id="refreshFooter" class="muted" style="font-size:11.5px;text-align:right;margin-top:10px;"></div>
</div>

<script>
const FIREBASE_BASE = 'https://solarcrm-ba919-default-rtdb.firebaseio.com';
async function fetchJson(path){
  try{
    const res = await fetch(`${FIREBASE_BASE}/${path}.json`);
    if(!res.ok) return {};
    return (await res.json()) || {};
  }catch(e){ return {}; }
}
function toArray(obj){ if(!obj) return []; return Array.isArray(obj) ? obj.filter(Boolean) : Object.values(obj).filter(Boolean); }
function isoDate(d){ return d.toLocaleDateString('sv-SE',{timeZone:'Europe/Bucharest'}); }
function fmtTime(ts){ return new Date(ts).toLocaleTimeString('ro-RO',{timeZone:'Europe/Bucharest',hour:'2-digit',minute:'2-digit'}); }
function fmtDateLabel(iso){
  const d=new Date(iso+'T12:00:00');
  return d.toLocaleDateString('ro-RO',{timeZone:'Europe/Bucharest',weekday:'long',day:'2-digit',month:'long',year:'numeric'});
}
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

const dateInput = document.getElementById('datePick');
const dateDisplay = document.getElementById('datePickDisplay');
const dateText = document.getElementById('datePickText');
const todayIso = isoDate(new Date());
dateInput.value = todayIso;
let viewMode = 'zi'; // 'zi' | 'saptamana'
function dmy(iso){ const p=iso.split('-'); return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : iso; }
function syncDisplay(){ dateText.textContent = dmy(dateInput.value || todayIso); }
dateDisplay.addEventListener('click', ()=>{ if(dateInput.showPicker) dateInput.showPicker(); else dateInput.click(); });
syncDisplay();
function weekDaysOf(iso){
  const d=new Date(iso+'T12:00:00'); const dow=(d.getDay()+6)%7; // 0=luni
  d.setDate(d.getDate()-dow);
  const out=[]; for(let i=0;i<7;i++){ out.push(isoDate(d)); d.setDate(d.getDate()+1); } return out;
}

async function render(){
  const iso = dateInput.value || todayIso;
  syncDisplay();
  const rangeDays = viewMode==='saptamana' ? weekDaysOf(iso) : [iso];
  if(viewMode==='saptamana'){
    document.getElementById('dateLabel').textContent = `${dmy(rangeDays[0])} – ${dmy(rangeDays[6])}`;
  } else {
    document.getElementById('dateLabel').textContent = fmtDateLabel(iso);
  }
  document.getElementById('refreshFooter').textContent = 'se încarcă...';

  const [crmData, planningData, visitsData, pontajData] = await Promise.all([
    fetchJson('solarcrm_v2'), fetchJson('shc_planning'), fetchJson('shc_visits'), fetchJson('shc_pontaj')
  ]);
  const cfg = crmData.config || {};
  const users = toArray(cfg.users);
  const projects = toArray(crmData.projects);
  const allOffers = toArray(crmData.oferte_calculator);
  const planningProjects = toArray(planningData.projects);
  const allVisits = toArray(visitsData.visits);
  const allPontaj = toArray(pontajData.records);

  const agentSel = document.getElementById('agentSel');
  if(!agentSel.dataset.filled){
    users.forEach(u=>{ const o=document.createElement('option'); o.value=u.name||''; o.textContent=u.name||'?'; agentSel.appendChild(o); });
    agentSel.dataset.filled='1';
    agentSel.onchange = render;
  }
  const agentFilter = agentSel.value;
  const dTag = d => viewMode==='saptamana' ? ` <span class="muted">(${dmy(d)})</span>` : '';

  function dayBounds(dISO){ const s=new Date(dISO+'T00:00:00+03:00').getTime(); return [s, s+24*3600*1000]; }
  function crmLogFor(dISO){
    const [s,e]=dayBounds(dISO); const out=[];
    projects.forEach(p=>{
      toArray(p.auditLog).filter(ev=>ev.timestamp && ev.timestamp>=s && ev.timestamp<e).forEach(ev=>{
        if(agentFilter && ev.user!==agentFilter) return;
        out.push({client:p.client||'Client', action:ev.action||'actualizare', reason:ev.reason||'', by:ev.user||'', time:ev.timestamp, day:dISO});
      });
    });
    return out.sort((a,b)=>b.time-a.time);
  }
  function offersFor(dISO){ const [s,e]=dayBounds(dISO); return allOffers.filter(o=>o.timestamp&&o.timestamp>=s&&o.timestamp<e&&(!agentFilter||o.user===agentFilter||o.creatDe===agentFilter)).map(o=>({...o,day:dISO})); }
  function visitsFor(dISO){ const [s,e]=dayBounds(dISO); return allVisits.filter(v=>v.createdAt&&v.createdAt>=s&&v.createdAt<e&&(!agentFilter||v.createdBy===agentFilter)).map(v=>({...v,day:dISO})); }
  function pontajFor(dISO){ return allPontaj.filter(r=>r.date===dISO&&(!agentFilter||r.userName===agentFilter)); }
  const flat = (fn) => rangeDays.flatMap(fn);

  const crmLog = flat(crmLogFor).sort((a,b)=>b.time-a.time);
  const offers = flat(offersFor).sort((a,b)=>b.timestamp-a.timestamp);
  const visits = flat(visitsFor);
  const pontajRecords = flat(pontajFor);

  let html = '';

  html += section('📋 SolarCRM — activitate', crmLog.length, crmLog.map(a=>
    `<li><strong>${esc(a.client)}</strong> — ${esc(a.action)}${a.reason?' ('+esc(a.reason)+')':''} <span class="muted">· ${a.by?esc(a.by)+' · ':''}${fmtTime(a.time)}</span>${dTag(a.day)}</li>`));

  // Follow-up restante (calculat la ultima zi din interval) — nu se filtreaza pe zi, doar pe agent
  const overdue = [], stale = [];
  const refIso = rangeDays[rangeDays.length-1];
  const refDate = new Date(refIso+'T00:00:00');
  projects.forEach(p=>{
    if(!['Lead','Ofertă','Contract'].includes(p.status)) return;
    if(agentFilter && p.responsabil!==agentFilter) return;
    if(p.nextFollowUp){
      const fu = new Date(p.nextFollowUp+'T00:00:00');
      if(fu < refDate) overdue.push({client:p.client||'Client', date:p.nextFollowUp, resp:p.responsabil||'—'});
    } else {
      const base = p.fuLastContactAt ? p.fuLastContactAt.slice(0,10) : (p.date_inserted||p.date_start);
      if(base){ const days=Math.round((refDate-new Date(base+'T00:00:00'))/86400000); if(days>=10) stale.push({client:p.client||'Client',days,resp:p.responsabil||'—'}); }
    }
  });
  const fuItems = [
    ...overdue.map(o=>`<li><span class="badge-late">⚠ restant</span> <strong>${esc(o.client)}</strong> — programat ${o.date} <span class="muted">· ${esc(o.resp)}</span></li>`),
    ...stale.map(s=>`<li><span class="badge-up">⏰ ${s.days} zile</span> <strong>${esc(s.client)}</strong> fără contact nou <span class="muted">· ${esc(s.resp)}</span></li>`)
  ];
  html += section('⏰ Follow-up necesar', fuItems.length, fuItems);

  html += section('☀️ Oferte generate (Calculator PV-BESS)', offers.length, offers.map(o=>
    `<li><strong>${esc(o.client||o.numeClient||'Client')}</strong> ${o.kwp?'— '+o.kwp+' kWp':''} <span class="muted">· ${esc(o.user||o.creatDe||'')} · ${fmtTime(o.timestamp)}</span>${dTag(o.day)}</li>`));

  const late=[], upcoming=[];
  planningProjects.forEach(p=>{
    toArray(p.stages).forEach(s=>{
      if(agentFilter && s.responsabil!==agentFilter) return;
      if(s.status==='intarziat') late.push({project:p.name, stage:s.type});
      if(rangeDays.includes(s.startDate)) upcoming.push({project:p.name, stage:s.type, day:s.startDate});
    });
  });
  const planItems=[
    ...late.map(l=>`<li><span class="badge-late">⚠ întârziat</span> ${esc(l.project)} — ${esc(l.stage)}</li>`),
    ...upcoming.map(u=>`<li><span class="badge-up">⏰ începe</span> ${esc(u.project)} — ${esc(u.stage)}${dTag(u.day)}</li>`)
  ];
  html += section('📅 Planificare Șantier', planItems.length, planItems);

  html += section('📷 Vizită Șantier — adăugate', visits.length, visits.map(v=>
    `<li><strong>${esc(v.client||v.address||'Vizită')}</strong> ${v.address?'— '+esc(v.address):''} <span class="muted">· de ${esc(v.createdBy||'—')}</span>${dTag(v.day)}</li>`));

  const pontajItems = pontajRecords.filter(r=>r.checkIn).map(r=>{
    const km = r.checkIn.distKm!=null?r.checkIn.distKm:null;
    return `<li><strong>${esc(r.userName||'?')}</strong> — intrare ${r.checkIn.time?fmtTime(r.checkIn.time):''}${r.checkOut?', ieșire '+fmtTime(r.checkOut.time):''} ${km!=null&&km>50?'<span class="badge-up">🚗 '+km+' km</span>':''}${dTag(r.date)}</li>`;
  });
  html += section('🕐 Pontaj — prezențe', pontajItems.length, pontajItems);

  document.getElementById('content').innerHTML = html || `<div class="empty">Nicio activitate în ${viewMode==='saptamana'?'această săptămână':'această zi'}.</div>`;

  // ── Fără activitate (doar agenti, nu admin) ──
  const noActWrap = document.getElementById('noActivityWrap');
  if(!agentFilter){
    const activeNames = new Set([
      ...crmLog.map(a=>a.by).filter(Boolean),
      ...pontajRecords.filter(r=>r.checkIn).map(r=>r.userName).filter(Boolean),
      ...visits.map(v=>v.createdBy).filter(Boolean),
      ...offers.map(o=>o.userName||o.user||o.creatDe).filter(Boolean),
    ]);
    const inactive = users.filter(u=>u.name && !activeNames.has(u.name) && u.role!=='admin');
    const periodLbl = viewMode==='saptamana' ? `${dmy(rangeDays[0])} – ${dmy(rangeDays[6])}` : dmy(iso);
    if(inactive.length){
      noActWrap.innerHTML = `<div class="section"><h3>😶 Fără activitate în ${periodLbl} <span class="muted" style="font-weight:400;font-size:12px;">(${inactive.length})</span></h3><ul>${inactive.map(u=>`<li>${esc(u.name)}</li>`).join('')}</ul></div>`;
    } else noActWrap.innerHTML='';
  } else noActWrap.innerHTML='';

  // ── Linie productivitate 7 zile + comparatie cu perioada anterioara ──
  const trendAnchor = viewMode==='saptamana' ? rangeDays[6] : iso;
  const last7=[]; for(let i=6;i>=0;i--){ const d=new Date(trendAnchor+'T12:00:00'); d.setDate(d.getDate()-i); last7.push(isoDate(d)); }
  const totals = last7.map(dISO => crmLogFor(dISO).length + offersFor(dISO).length + visitsFor(dISO).length);
  drawProdLine(last7, totals, rangeDays);

  const todayTotal = crmLog.length + offers.length + visits.length;
  let prevTotal, prevLbl;
  if(viewMode==='saptamana'){
    const prevWeekDays = weekDaysOf(rangeDays[0]).map(()=>null); // placeholder unused
    const prevAnchor = new Date(rangeDays[0]+'T12:00:00'); prevAnchor.setDate(prevAnchor.getDate()-1);
    const prevWeek = weekDaysOf(isoDate(prevAnchor));
    prevTotal = prevWeek.reduce((sum,d)=>sum+crmLogFor(d).length+offersFor(d).length+visitsFor(d).length,0);
    prevLbl = 'săptămâna trecută';
  } else {
    const prevIsoD = new Date(iso+'T12:00:00'); prevIsoD.setDate(prevIsoD.getDate()-1);
    const prevIso = isoDate(prevIsoD);
    prevTotal = crmLogFor(prevIso).length + offersFor(prevIso).length + visitsFor(prevIso).length;
    prevLbl = 'ieri';
  }
  const diff = todayTotal - prevTotal;
  const diffTxt = diff===0 ? `la fel ca ${prevLbl}` : (diff>0 ? `<span class="up">▲ +${diff}</span> față de ${prevLbl}` : `<span class="down">▼ ${diff}</span> față de ${prevLbl}`);
  document.getElementById('cmpWrap').innerHTML = `<div class="cmp">Activitate: <b>${todayTotal}</b> · ${diffTxt} <span class="muted">(${prevTotal})</span></div>`;

  document.getElementById('refreshFooter').textContent = 'actualizat ' + new Date().toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'});
}
function drawProdLine(days, totals, highlightDays){
  const svg = document.getElementById('prodLine');
  const W=700,H=70,padX=26,padTop=10,padBottom=20;
  const maxT = Math.max(1, ...totals);
  const stepX = (W-2*padX)/(days.length-1);
  const chartH = H-padTop-padBottom;
  const pts = totals.map((t,i)=>{
    const x = padX + i*stepX;
    const y = padTop + chartH - (t/maxT)*chartH;
    return [x,y];
  });
  const line = pts.map(p=>p.join(',')).join(' ');
  const area = `${padX},${padTop+chartH} ${line} ${padX+(days.length-1)*stepX},${padTop+chartH}`;
  const dots = pts.map(([x,y],i)=>{
    const hi = highlightDays.includes(days[i]);
    return `<circle cx="${x}" cy="${y}" r="${hi?4.5:3}" fill="${hi?'#f59e0b':'#475569'}" stroke="#0c1526" stroke-width="1.5"><title>${totals[i]} · ${dmy(days[i])}</title></circle>
      <text x="${x}" y="${y-10}" font-size="10" fill="${hi?'#f59e0b':'#64748b'}" text-anchor="middle" font-weight="600">${totals[i]}</text>`;
  }).join('');
  const labels = days.map((d,i)=>{
    const x = padX + i*stepX;
    const lbl = new Date(d+'T12:00:00').toLocaleDateString('ro-RO',{weekday:'short'});
    return `<text x="${x}" y="${H-2}" font-size="10.5" fill="#64748b" text-anchor="middle">${lbl}</text>`;
  }).join('');
  svg.innerHTML = `<polygon points="${area}" fill="rgba(245,158,11,0.08)"/><polyline points="${line}" fill="none" stroke="#f59e0b" stroke-width="2"/>${dots}${labels}`;
}
function section(title, count, items){
  if(!count) return '';
  return `<div class="section"><h3>${title} <span class="muted" style="font-weight:400;font-size:12px;">(${count})</span></h3><ul>${items.join('')}</ul></div>`;
}

document.getElementById('prevDay').onclick = ()=>{ const step=viewMode==='saptamana'?7:1; const d=new Date(dateInput.value+'T12:00:00'); d.setDate(d.getDate()-step); dateInput.value=isoDate(d); render(); };
document.getElementById('nextDay').onclick = ()=>{ const step=viewMode==='saptamana'?7:1; const d=new Date(dateInput.value+'T12:00:00'); d.setDate(d.getDate()+step); dateInput.value=isoDate(d); render(); };
document.getElementById('todayBtn').onclick = ()=>{ dateInput.value=todayIso; render(); };
document.getElementById('printBtn').onclick = ()=>window.print();
document.getElementById('modeDay').onclick = ()=>{ viewMode='zi'; document.getElementById('modeDay').classList.add('active'); document.getElementById('modeWeek').classList.remove('active'); render(); };
document.getElementById('modeWeek').onclick = ()=>{ viewMode='saptamana'; document.getElementById('modeWeek').classList.add('active'); document.getElementById('modeDay').classList.remove('active'); render(); };dateInput.onchange = render;
render();

(function(){
  if(window.innerWidth<=768) return;
  setTimeout(()=>{
    const canvas=document.getElementById('crmParticleCanvas');
    if(!canvas||canvas._particlesStarted) return;
    canvas._particlesStarted=true;
    const ctx=canvas.getContext('2d');
    let W,H,particles=[];
    function resize(){ const r=canvas.parentElement.getBoundingClientRect(); W=canvas.width=Math.max(r.width||window.innerWidth,50); H=canvas.height=32; }
    function mkParticle(){
      return { x:Math.random()*W, y:Math.random()*H, z:Math.random()*600+100, vz:-(Math.random()*0.4+0.1),
        color:['#3b82f6','#f59e0b','#10b981','#8b5cf6','#06b6d4','#f97316'][Math.floor(Math.random()*6)],
        pulse:Math.random()*Math.PI*2, pulseSpeed:Math.random()*0.02+0.01 };
    }
    function init(){ resize(); particles=[]; for(let i=0;i<55;i++) particles.push(mkParticle()); }
    function project(p){ const fov=400; const scale=fov/(fov+p.z); return { x:W/2+(p.x-W/2)*scale, y:H/2+(p.y-H/2)*scale, r:Math.max(0.5,(8-p.z/100)*scale*2) }; }
    function draw(){
      if(!document.body.contains(canvas)) return;
      ctx.clearRect(0,0,W,H);
      particles.sort((a,b)=>b.z-a.z);
      particles.forEach(p=>{
        p.z+=p.vz*2; p.pulse+=p.pulseSpeed;
        if(p.z<50||p.z>700){ Object.assign(p,mkParticle(),{z:650}); return; }
        const {x,y,r}=project(p);
        const pulseMod=1+Math.sin(p.pulse)*0.3;
        const rr=r*pulseMod;
        const g=ctx.createRadialGradient(x,y,0,x,y,rr*3);
        g.addColorStop(0,p.color+'cc'); g.addColorStop(0.4,p.color+'44'); g.addColorStop(1,'transparent');
        ctx.beginPath(); ctx.arc(x,y,rr*3,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
        ctx.beginPath(); ctx.arc(x,y,rr,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    init(); draw();
    window.addEventListener('resize',resize);
    setTimeout(resize,300);
  },150);
})();
</script>
